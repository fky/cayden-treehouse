<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌲 种树小游戏</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

:root {
  --bg: #0f0c29;
  --panel: #1e1854;
  --border: #3d2fa0;
  --accent: #f7d94c;
  --success: #4ade80;
  --error: #f87171;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 12px 32px;
  background-image:
    radial-gradient(ellipse at 15% 15%, #2d1b6933 0%, transparent 55%),
    radial-gradient(ellipse at 85% 85%, #0d2b5533 0%, transparent 55%);
}

h1 {
  color: var(--accent);
  font-size: 1.8rem;
  font-weight: 900;
  text-shadow: 0 0 24px #f7d94c66;
  margin-bottom: 4px;
  letter-spacing: 2px;
}

.tip {
  color: #9b8fd4;
  font-size: 0.75rem;
  margin-bottom: 14px;
  text-align: center;
}

.diff-row {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
  justify-content: center;
}

.diff-btn {
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 0.78rem;
  padding: 6px 14px;
  border: 2px solid #3d2fa0;
  border-radius: 20px;
  cursor: pointer;
  background: var(--panel);
  color: #c4b5fd;
  transition: all 0.15s;
}
.diff-btn:hover { border-color: var(--accent); color: var(--accent); }
.diff-btn.active {
  background: var(--accent);
  color: #1a1040;
  border-color: var(--accent);
  box-shadow: 0 0 12px #f7d94c55;
}

.rules {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 16px;
  margin-bottom: 12px;
  color: #ddd6fe;
  font-size: 0.78rem;
  line-height: 1.75;
  max-width: 460px;
  width: 100%;
}
.rules strong { color: var(--accent); }

.legend {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 12px;
  max-width: 460px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 0.72rem;
  color: #c4b5fd;
  font-weight: 700;
}
.legend-dot {
  width: 14px; height: 14px;
  border-radius: 3px;
  border: 1.5px solid #ffffff22;
}

.grid-wrap {
  background: var(--panel);
  border-radius: 16px;
  padding: 12px;
  border: 2px solid var(--border);
  box-shadow: 0 0 36px #2d1b6944, 0 8px 28px #0009;
  margin-bottom: 14px;
}

.grid { display: grid; gap: 3px; }

.cell {
  border-radius: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  position: relative;
  transition: transform 0.1s, filter 0.1s;
  user-select: none;
  border: 2px solid transparent;
}
.cell:hover  { transform: scale(1.08); filter: brightness(1.18); }
.cell:active { transform: scale(0.93); }

.cell::after {
  position: absolute;
  line-height: 1;
  pointer-events: none;
}

.cell.has-cross::after {
  content: '✕';
  font-weight: 900;
  color: #ef4444dd;
  font-size: 1.35rem;
  animation: pop 0.15s cubic-bezier(.36,2,.6,1);
}
.cell.has-tree::after {
  content: '🌲';
  font-size: 1.5rem;
  animation: pop 0.2s cubic-bezier(.36,2,.6,1);
}
.cell.has-question::after {
  content: '?';
  font-weight: 900;
  color: #fde047;
  font-size: 1.5rem;
  animation: pop 0.15s cubic-bezier(.36,2,.6,1);
}
.cell.conflict {
  filter: brightness(0.58) !important;
  border-color: var(--error) !important;
  box-shadow: 0 0 10px var(--error);
  animation: shake 0.3s;
}

@keyframes pop {
  0%   { transform: scale(0) rotate(-15deg); opacity: 0; }
  100% { transform: scale(1) rotate(0deg);   opacity: 1; }
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25%     { transform: translateX(-4px); }
  75%     { transform: translateX(4px); }
}

.buttons {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  flex-wrap: wrap;
  justify-content: center;
}
button {
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 0.85rem;
  padding: 9px 20px;
  border: none;
  border-radius: 28px;
  cursor: pointer;
  transition: transform 0.12s, filter 0.12s;
}
button:hover  { transform: translateY(-2px); filter: brightness(1.1); }
button:active { transform: translateY(0); }

#newBtn   { background: #ec4899; color: #fff; box-shadow: 0 4px 12px #ec489944; }
#resetBtn { background: #7c3aed; color: #fff; box-shadow: 0 4px 12px #7c3aed44; }
#hintBtn  { background: var(--accent); color: #1a1040; box-shadow: 0 4px 12px #f7d94c44; }
#solveBtn { background: #059669; color: #fff; box-shadow: 0 4px 12px #05966944; }
#muteBtn  { background: #1e1854; color: #c4b5fd; border: 2px solid var(--border); padding: 7px 14px; font-size: 0.78rem;}

.status {
  font-size: 0.9rem;
  font-weight: 700;
  min-height: 24px;
  color: #ddd6fe;
  letter-spacing: 0.4px;
  transition: color 0.3s;
  text-align: center;
}
.status.win { color: var(--success); text-shadow: 0 0 14px var(--success); font-size: 1.05rem; }
.status.err { color: var(--error); }

.stats {
  margin-top: 14px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px 16px;
  max-width: 460px;
  width: 100%;
}
.stats-title {
  color: #c4b5fd;
  font-size: 0.82rem;
  font-weight: 700;
  text-align: center;
  margin-bottom: 10px;
  letter-spacing: 0.5px;
}
.stats-title span { color: var(--accent); }
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 10px;
}
.stat-cell {
  background: #0f0c29aa;
  border-radius: 8px;
  padding: 8px 4px;
  text-align: center;
}
.stat-num {
  font-size: 1.4rem;
  font-weight: 900;
  font-family: 'Nunito', sans-serif;
  line-height: 1.1;
}
.win-num  { color: var(--success); }
.lose-num { color: var(--error); }
.hint-num { color: var(--accent); }
.rate-num { color: #93c5fd; }
.stat-label {
  font-size: 0.7rem;
  color: #9b8fd4;
  margin-top: 2px;
}
.stats-clear {
  width: 100%;
  background: transparent;
  color: #9b8fd4;
  border: 1px solid #3d2fa0;
  font-size: 0.72rem;
  font-weight: 700;
  padding: 6px;
  border-radius: 16px;
  letter-spacing: 0.5px;
}
.stats-clear:hover { color: var(--error); border-color: var(--error); }

.win-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: #000b;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
.win-overlay.show { display: flex; }
.win-box {
  background: var(--panel);
  border: 2px solid var(--success);
  border-radius: 22px;
  padding: 36px 44px;
  text-align: center;
  box-shadow: 0 0 60px #4ade8055;
  animation: pop 0.3s cubic-bezier(.36,2,.6,1);
}
.win-box h2 { font-size: 2.2rem; color: var(--success); margin-bottom: 8px; }
.win-box p  { color: #ddd6fe; margin-bottom: 18px; font-size: 0.88rem; }
.win-box button { background: var(--success); color: #0f0c29; }
</style>
</head>
<body>

<h1>🌲 种树小游戏</h1>
<div class="tip">单击 ✕ 排除 · 双击 🌲 种树 · 三击 ? 标记 · 四击清空<br>种满后才会判断对错 🤫</div>

<div class="diff-row">
  <button class="diff-btn" data-diff="easy"   onclick="setDiff('easy')">🌱 简单 4×4</button>
  <button class="diff-btn active" data-diff="medium" onclick="setDiff('medium')">🌿 中等 5×5</button>
  <button class="diff-btn" data-diff="hard"   onclick="setDiff('hard')">🌳 困难 6×6</button>
  <button class="diff-btn" data-diff="expert" onclick="setDiff('expert')">🏆 专家 7×7</button>
</div>

<div class="rules">
  种树规则：<br>
  <strong>（1）</strong> 每种颜色代表一个小区，每个小区有且<strong>只有 1 棵树</strong><br>
  <strong>（2）</strong> 每行每列有且<strong>只有 1 棵树</strong><br>
  <strong>（3）</strong> 每棵树周围的 <strong>8 个格子</strong>中不能再种树
</div>

<div class="legend" id="legend"></div>

<div class="grid-wrap">
  <div class="grid" id="grid"></div>
</div>

<div class="buttons">
  <button id="newBtn"   onclick="newPuzzle()">🎲 新题</button>
  <button id="resetBtn" onclick="reset()">🔄 重置</button>
  <button id="hintBtn"  onclick="hint()">💡 提示</button>
  <button id="solveBtn" onclick="autoSolve()">✨ 解答</button>
  <button id="muteBtn"  onclick="toggleMute()">🔊 音效</button>
</div>

<div class="status" id="status"></div>

<div class="stats" id="stats">
  <div class="stats-title">📊 战绩（<span id="statsDiffName">中等</span>）</div>
  <div class="stats-row">
    <div class="stat-cell"><div class="stat-num win-num"  id="statWin">0</div><div class="stat-label">🏆 胜利</div></div>
    <div class="stat-cell"><div class="stat-num lose-num" id="statLose">0</div><div class="stat-label">😢 失败</div></div>
    <div class="stat-cell"><div class="stat-num hint-num" id="statHint">0</div><div class="stat-label">💡 提示</div></div>
    <div class="stat-cell"><div class="stat-num rate-num" id="statRate">—</div><div class="stat-label">📈 胜率</div></div>
  </div>
  <button class="stats-clear" onclick="clearStats()">清空本难度战绩</button>
</div>

<div class="win-overlay" id="winOverlay">
  <div class="win-box">
    <h2>🎉 完成！</h2>
    <p>太棒了！你成功给每个小区都种上了树！</p>
    <button onclick="nextPuzzleFromWin()">▶️ 下一题</button>
  </div>
</div>

<script>
// ─── Audio (WebAudio synth, no external assets) ──────
let AC = null;
let muted = false;

function initAudio() {
  if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  if (AC.state === 'suspended') AC.resume();
}

function tone(freq, type, dur, vol = 0.15, delay = 0) {
  if (muted || !AC) return;
  const osc = AC.createOscillator();
  const g   = AC.createGain();
  osc.connect(g); g.connect(AC.destination);
  osc.type = type;
  const t = AC.currentTime + delay;
  osc.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(0.001, t);
  g.gain.exponentialRampToValueAtTime(vol, t + 0.01);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.start(t); osc.stop(t + dur + 0.02);
}

const SFX = {
  cross:    () => tone(220, 'square',   0.08, 0.10),
  tree:     () => { tone(523, 'sine', 0.12, 0.18); tone(784, 'sine', 0.15, 0.14, 0.06); },
  question: () => tone(440, 'triangle', 0.10, 0.12),
  clear:    () => tone(180, 'sine',     0.10, 0.10),
  error:    () => { tone(150, 'sawtooth', 0.15, 0.18); tone(120, 'sawtooth', 0.18, 0.16, 0.05); },
  win:      () => {
    [523, 659, 784, 1047].forEach((f, i) => tone(f, 'sine', 0.18, 0.20, i * 0.10));
  },
  hint:     () => { tone(880, 'sine', 0.08, 0.14); tone(1175, 'sine', 0.10, 0.12, 0.05); },
  reset:    () => tone(330, 'triangle', 0.08, 0.10),
};

function toggleMute() {
  muted = !muted;
  document.getElementById('muteBtn').textContent = muted ? '🔇 静音' : '🔊 音效';
}

// ─── Stats (per-difficulty, persisted to localStorage) ──
const STATS_KEY = 'tree-puzzle-stats-v1';
const DIFF_NAMES = { easy: '简单 4×4', medium: '中等 5×5', hard: '困难 6×6', expert: '专家 7×7' };

function loadStats() {
  try {
    const raw = localStorage.getItem(STATS_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return {
    easy:   { win: 0, lose: 0, hint: 0 },
    medium: { win: 0, lose: 0, hint: 0 },
    hard:   { win: 0, lose: 0, hint: 0 },
    expert: { win: 0, lose: 0, hint: 0 },
  };
}

let stats = loadStats();
// Track whether the current puzzle has had any interaction yet,
// so opening a fresh puzzle and immediately switching doesn't count as a loss.
let puzzleTouched = false;
// Once a puzzle is resolved (won, or counted as lost via reset/solve),
// further actions on the same board don't add more losses.
let puzzleResolved = false;

function saveStats() {
  try { localStorage.setItem(STATS_KEY, JSON.stringify(stats)); } catch (e) {}
}

function renderStats() {
  const s = stats[currentDiff];
  document.getElementById('statsDiffName').textContent = DIFF_NAMES[currentDiff];
  document.getElementById('statWin').textContent  = s.win;
  document.getElementById('statLose').textContent = s.lose;
  document.getElementById('statHint').textContent = s.hint;
  const total = s.win + s.lose;
  document.getElementById('statRate').textContent =
    total === 0 ? '—' : `${Math.round(s.win / total * 100)}%`;
}

function recordWin() {
  if (puzzleResolved) return;
  stats[currentDiff].win++;
  puzzleResolved = true;
  saveStats();
  renderStats();
}

function recordLoss() {
  if (puzzleResolved || !puzzleTouched) return;
  stats[currentDiff].lose++;
  puzzleResolved = true;
  saveStats();
  renderStats();
}

function recordHint() {
  stats[currentDiff].hint++;
  saveStats();
  renderStats();
}

function clearStats() {
  if (!confirm(`确定清空"${DIFF_NAMES[currentDiff]}"的战绩吗？`)) return;
  stats[currentDiff] = { win: 0, lose: 0, hint: 0 };
  saveStats();
  renderStats();
}

// ─── Puzzle Data ─────────────────────────────────────
// State: 0=empty, 1=cross ✕, 2=tree 🌲, 3=question ?
// Click cycle: empty → ✕ → 🌲 → ? → empty

const COLORS = {
  P: { name: '粉', css: '#f9a8d4' },
  Y: { name: '黄', css: '#fde047' },
  B: { name: '蓝', css: '#93c5fd' },
  G: { name: '绿', css: '#86efac' },
  V: { name: '紫', css: '#c4b5fd' },
  O: { name: '橙', css: '#fdba74' },
  R: { name: '红', css: '#fca5a5' },
};

const DIFFICULTIES = {
  easy:   { size: 4, cellPx: 70 },
  medium: { size: 5, cellPx: 62 },
  hard:   { size: 6, cellPx: 54 },
  expert: { size: 7, cellPx: 48 },
};

const REGION_KEYS = ['P','Y','B','G','V','O','R'];

let currentDiff = 'medium';
let N = 5;
let MAP = [];
let state = [];

// ─── Random Puzzle Generator ─────────────────────────
// 1. Place N trees on an N×N board so every row/col has exactly one
//    and no two are adjacent (8-neighbors). This is the solution.
// 2. Flood-fill colored regions, each containing exactly one tree.
// 3. Each region grows outward from its tree using a random BFS until
//    all cells are claimed.

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function placeTrees(n) {
  // Backtracking: pick a column for each row, no adjacency, no col reuse.
  const cols = Array(n).fill(-1);
  const usedCol = new Set();

  function ok(r, c) {
    if (usedCol.has(c)) return false;
    if (r > 0) {
      // forbid col-1, col, col+1 in previous row (8-adj)
      const pc = cols[r - 1];
      if (Math.abs(pc - c) <= 1) return false;
    }
    return true;
  }

  function backtrack(r) {
    if (r === n) return true;
    const order = shuffle([...Array(n).keys()]);
    for (const c of order) {
      if (ok(r, c)) {
        cols[r] = c;
        usedCol.add(c);
        if (backtrack(r + 1)) return true;
        cols[r] = -1;
        usedCol.delete(c);
      }
    }
    return false;
  }

  backtrack(0);
  return cols.map((c, r) => [r, c]);
}

// Per-difficulty growth-weight spread.
// Each region gets a random weight in [minW, maxW]. The bigger the spread,
// the more lopsided the final region sizes become.
//   - Low difficulty → very lopsided (a few big regions, a few tiny ones).
//   - High difficulty → still varied, but with a wider spread we get the
//     small regions needed to force a unique solution.
const WEIGHT_SPREAD = {
  easy:   [1,  9],
  medium: [1,  6],
  hard:   [1,  5],
  expert: [1,  8],
};

// Per-difficulty size constraints on the region-size distribution (sorted asc):
//   easy   → smallest is 1 cell (tree is forced — instant entry point)
//   medium → smallest ≤ 2 (tree narrowed to 2 cells)
//   hard   → smallest ≤ 3, second-smallest ≤ 5 (two clear entry points)
//   expert → smallest ≤ 2, 2nd ≤ 3, 3rd ≤ 5 (multiple anchors; also helps
//             the uniqueness solver actually find a single solution on 7×7)
function difficultyOk(map) {
  const counts = {};
  for (const row of map) for (const k of row) counts[k] = (counts[k] || 0) + 1;
  const sizes = Object.values(counts).sort((a, b) => a - b);
  if (currentDiff === 'easy')   return sizes[0] === 1;
  if (currentDiff === 'medium') return sizes[0] <= 2;
  if (currentDiff === 'hard')   return sizes[0] <= 3 && sizes[1] <= 5;
  if (currentDiff === 'expert') return sizes[0] <= 2 && sizes[1] <= 3 && sizes[2] <= 5;
  return true;
}

// Count solutions of a given puzzle map (up to a cap). Used to enforce
// uniqueness — a puzzle with multiple valid placements is unfair because
// the player can be "right" by their own logic yet flagged as wrong.
function countSolutions(map, n, cap = 2) {
  // Build regions for this map.
  const regions = {};
  for (let r = 0; r < n; r++)
    for (let c = 0; c < n; c++) {
      const k = map[r][c];
      if (!regions[k]) regions[k] = [];
      regions[k].push([r, c]);
    }
  // Order regions smallest-first to prune faster.
  const regionKeys = Object.keys(regions).sort((a, b) => regions[a].length - regions[b].length);
  const placed = Array.from({length: n}, () => Array(n).fill(0));
  const usedRows = new Set();
  const usedCols = new Set();
  let found = 0;

  function isValid(r, c) {
    if (usedRows.has(r) || usedCols.has(c)) return false;
    for (let dr = -1; dr <= 1; dr++)
      for (let dc = -1; dc <= 1; dc++) {
        if (dr === 0 && dc === 0) continue;
        const nr = r + dr, nc = c + dc;
        if (nr >= 0 && nr < n && nc >= 0 && nc < n && placed[nr][nc] === 1) return false;
      }
    return true;
  }

  function recurse(idx) {
    if (found >= cap) return;
    if (idx === regionKeys.length) { found++; return; }
    const key = regionKeys[idx];
    for (const [r, c] of regions[key]) {
      if (isValid(r, c)) {
        placed[r][c] = 1;
        usedRows.add(r); usedCols.add(c);
        recurse(idx + 1);
        placed[r][c] = 0;
        usedRows.delete(r); usedCols.delete(c);
        if (found >= cap) return;
      }
    }
  }

  recurse(0);
  return found;
}

// Canonical fingerprint of a map: relabel regions by first appearance order
// in row-major scan, then serialize. Two maps with the same partition shape
// produce the same fingerprint regardless of which color got which name.
function fingerprintMap(map) {
  const remap = {};
  let next = 0;
  const out = [];
  for (const row of map) {
    for (const k of row) {
      if (remap[k] === undefined) remap[k] = next++;
      out.push(remap[k]);
    }
  }
  return out.join(',');
}

// Recently-seen puzzle fingerprints for the current session, per difficulty.
// Cleared on page reload (not persisted) — duplicates across sessions are fine.
const seenFingerprints = { easy: new Set(), medium: new Set(), hard: new Set(), expert: new Set() };

function generatePuzzle(n) {
  // Strategy: try hard to find a fresh puzzle that meets all constraints.
  // If we keep colliding with the seen-set, progressively relax:
  //   Pass 1 (strict):  size constraint + unique solution + not seen
  //   Pass 2 (relax weights): widen weight range, still unique + not seen
  //   Pass 3 (relax size):    drop size constraint, keep unique + not seen
  //   Pass 4 (allow dup):     reset seen-set for this difficulty and retry
  const seen = seenFingerprints[currentDiff];
  const baseSpread = WEIGHT_SPREAD[currentDiff];
  const wideSpread = [1, Math.max(baseSpread[1] + 3, 10)];

  // Pass 1: strict
  for (let i = 0; i < 1500; i++) {
    const map = generatePuzzleOnce(n, baseSpread);
    if (!difficultyOk(map)) continue;
    if (countSolutions(map, n) !== 1) continue;
    const fp = fingerprintMap(map);
    if (seen.has(fp)) continue;
    seen.add(fp);
    return map;
  }

  // Pass 2: same size constraint, widen weight range to escape local rut
  for (let i = 0; i < 500; i++) {
    const map = generatePuzzleOnce(n, wideSpread);
    if (!difficultyOk(map)) continue;
    if (countSolutions(map, n) !== 1) continue;
    const fp = fingerprintMap(map);
    if (seen.has(fp)) continue;
    seen.add(fp);
    return map;
  }

  // Pass 3: drop size constraint, still require uniqueness + freshness
  for (let i = 0; i < 500; i++) {
    const map = generatePuzzleOnce(n, wideSpread);
    if (countSolutions(map, n) !== 1) continue;
    const fp = fingerprintMap(map);
    if (seen.has(fp)) continue;
    seen.add(fp);
    return map;
  }

  // Pass 4: clear seen-set and accept the next valid unique puzzle (the player
  // has played enough of this difficulty that duplicates start being okay).
  seen.clear();
  for (let i = 0; i < 1500; i++) {
    const map = generatePuzzleOnce(n, baseSpread);
    if (!difficultyOk(map)) continue;
    if (countSolutions(map, n) !== 1) continue;
    seen.add(fingerprintMap(map));
    return map;
  }

  // Final fallback: best-effort.
  const map = generatePuzzleOnce(n, baseSpread);
  seen.add(fingerprintMap(map));
  return map;
}

function generatePuzzleOnce(n, spread) {
  const trees = placeTrees(n);
  const map = Array.from({length: n}, () => Array(n).fill(null));

  // Assign each region a random growth weight from the requested spread.
  const [minW, maxW] = spread || WEIGHT_SPREAD[currentDiff] || [1, 5];
  const weights = trees.map(() => minW + Math.random() * (maxW - minW));
  const totalCells = n * n;

  // Each tree seeds a region.
  const frontiers = trees.map(([r, c], i) => {
    const key = REGION_KEYS[i];
    map[r][c] = key;
    return [[r, c]];
  });

  // Weighted roulette: each step, pick a region in proportion to its weight,
  // then claim one adjacent unclaimed cell. Skip regions that are stuck.
  let unclaimed = totalCells - n;
  let safety = totalCells * 20;  // prevent infinite loops in degenerate cases
  while (unclaimed > 0 && safety-- > 0) {
    // build alive list with current weights
    const alive = [];
    let totalW = 0;
    for (let i = 0; i < trees.length; i++) {
      // Check if region i still has any growable neighbor.
      const frontier = frontiers[i];
      let canGrow = false;
      for (const [r, c] of frontier) {
        for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
          const nr = r + dr, nc = c + dc;
          if (nr >= 0 && nr < n && nc >= 0 && nc < n && map[nr][nc] === null) {
            canGrow = true; break;
          }
        }
        if (canGrow) break;
      }
      if (canGrow) {
        alive.push(i);
        totalW += weights[i];
      }
    }
    if (alive.length === 0) break;

    // Roulette pick
    let roll = Math.random() * totalW;
    let chosen = alive[alive.length - 1];
    for (const i of alive) {
      roll -= weights[i];
      if (roll <= 0) { chosen = i; break; }
    }

    // Claim one adjacent unclaimed cell of the chosen region.
    const frontier = frontiers[chosen];
    const key = REGION_KEYS[chosen];
    const candidates = [];
    for (const [r, c] of frontier) {
      for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
        const nr = r + dr, nc = c + dc;
        if (nr >= 0 && nr < n && nc >= 0 && nc < n && map[nr][nc] === null) {
          candidates.push([nr, nc]);
        }
      }
    }
    if (candidates.length === 0) continue;
    const [nr, nc] = candidates[Math.floor(Math.random() * candidates.length)];
    map[nr][nc] = key;
    frontier.push([nr, nc]);
    unclaimed--;
  }

  // Fallback: fill any leftover cells (rare) from nearest tree.
  for (let r = 0; r < n; r++)
    for (let c = 0; c < n; c++)
      if (map[r][c] === null) {
        let best = 0, bestDist = Infinity;
        trees.forEach(([tr, tc], i) => {
          const d = Math.abs(tr - r) + Math.abs(tc - c);
          if (d < bestDist) { bestDist = d; best = i; }
        });
        map[r][c] = REGION_KEYS[best];
      }

  return map;
}

// ─── Setup ────────────────────────────────────────────

function setDiff(diff) {
  initAudio();
  SFX.reset();
  // Record a loss against the OLD difficulty before switching.
  recordLoss();
  // After recording, mark resolved so newPuzzle() doesn't double-count.
  puzzleResolved = true;

  currentDiff = diff;
  N = DIFFICULTIES[diff].size;

  document.querySelectorAll('.diff-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.diff === diff);
  });

  newPuzzle();
}

function newPuzzle() {
  initAudio();
  SFX.reset();
  // Switching/regenerating with an active in-progress puzzle counts as a loss.
  recordLoss();
  MAP = generatePuzzle(N);
  state = Array.from({length: N}, () => Array(N).fill(0));
  puzzleTouched = false;
  puzzleResolved = false;

  buildLegend();
  buildGrid();
  render();
  renderStats();
  document.getElementById('status').textContent = `🌱 准备种 ${N} 棵树！`;
  document.getElementById('status').className = 'status';
  document.getElementById('winOverlay').classList.remove('show');
}

// Called from the win modal — previous puzzle is already won (resolved),
// so newPuzzle() won't record any loss.
function nextPuzzleFromWin() {
  document.getElementById('winOverlay').classList.remove('show');
  newPuzzle();
}

function getRegions() {
  const regions = {};
  for (let r = 0; r < N; r++)
    for (let c = 0; c < N; c++) {
      const k = MAP[r][c];
      if (!regions[k]) regions[k] = [];
      regions[k].push([r, c]);
    }
  return regions;
}

function buildLegend() {
  const legend = document.getElementById('legend');
  legend.innerHTML = '';
  const used = new Set();
  for (let r = 0; r < N; r++)
    for (let c = 0; c < N; c++) used.add(MAP[r][c]);
  [...used].forEach(k => {
    const v = COLORS[k];
    legend.innerHTML += `
      <div class="legend-item">
        <div class="legend-dot" style="background:${v.css}"></div>
        ${v.name}区
      </div>`;
  });
}

function buildGrid() {
  const grid = document.getElementById('grid');
  const px = DIFFICULTIES[currentDiff].cellPx;
  grid.style.gridTemplateColumns = `repeat(${N}, ${px}px)`;
  grid.style.gridTemplateRows    = `repeat(${N}, ${px}px)`;
  grid.innerHTML = '';
  for (let r = 0; r < N; r++) {
    for (let c = 0; c < N; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.id = `c-${r}-${c}`;
      cell.style.width = `${px}px`;
      cell.style.height = `${px}px`;
      const color = MAP[r][c];
      cell.style.background = COLORS[color].css + 'cc';
      cell.style.borderColor = COLORS[color].css + '55';
      cell.onclick = () => clickCell(r, c);
      grid.appendChild(cell);
    }
  }
}

// ─── Interaction ────────────────────────────────────────

function clickCell(r, c) {
  initAudio();
  if (puzzleResolved) return;
  puzzleTouched = true;
  state[r][c] = (state[r][c] + 1) % 4;
  const s = state[r][c];
  if      (s === 1) SFX.cross();
  else if (s === 2) SFX.tree();
  else if (s === 3) SFX.question();
  else              SFX.clear();
  render();
  checkWin();
}

function render() {
  const treeCount = state.flat().filter(v => v === 2).length;
  const complete = treeCount === N;
  const conflicts = complete ? getConflicts() : new Set();

  for (let r = 0; r < N; r++) {
    for (let c = 0; c < N; c++) {
      const cell = document.getElementById(`c-${r}-${c}`);
      cell.className = 'cell';
      if      (state[r][c] === 1) cell.classList.add('has-cross');
      else if (state[r][c] === 2) cell.classList.add('has-tree');
      else if (state[r][c] === 3) cell.classList.add('has-question');
      if (conflicts.has(`${r},${c}`)) cell.classList.add('conflict');
    }
  }

  const status = document.getElementById('status');
  if (complete && conflicts.size > 0) {
    status.textContent = `❌ 还有错误，再想想看～`;
    status.className = 'status err';
  } else {
    status.textContent = `已种 ${treeCount} / ${N} 棵树`;
    status.className = 'status';
  }
}

function getConflicts() {
  const bad = new Set();

  for (let r = 0; r < N; r++) {
    const cols = [];
    for (let c = 0; c < N; c++) if (state[r][c] === 2) cols.push(c);
    if (cols.length > 1) cols.forEach(c => bad.add(`${r},${c}`));
  }
  for (let c = 0; c < N; c++) {
    const rows = [];
    for (let r = 0; r < N; r++) if (state[r][c] === 2) rows.push(r);
    if (rows.length > 1) rows.forEach(r => bad.add(`${r},${c}`));
  }

  for (let r = 0; r < N; r++) {
    for (let c = 0; c < N; c++) {
      if (state[r][c] !== 2) continue;
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          if (dr === 0 && dc === 0) continue;
          const nr = r + dr, nc = c + dc;
          if (nr >= 0 && nr < N && nc >= 0 && nc < N && state[nr][nc] === 2) {
            bad.add(`${r},${c}`);
            bad.add(`${nr},${nc}`);
          }
        }
      }
    }
  }

  const regions = getRegions();
  for (const cells of Object.values(regions)) {
    const inRegion = cells.filter(([r,c]) => state[r][c] === 2);
    if (inRegion.length > 1) inRegion.forEach(([r,c]) => bad.add(`${r},${c}`));
  }

  return bad;
}

function checkWin() {
  const treeCount = state.flat().filter(v => v === 2).length;
  if (treeCount !== N) return;
  const conflicts = getConflicts();
  if (conflicts.size > 0) {
    SFX.error();
    return;
  }

  const regions = getRegions();
  for (const cells of Object.values(regions)) {
    if (cells.filter(([r,c]) => state[r][c] === 2).length !== 1) {
      SFX.error();
      return;
    }
  }

  SFX.win();
  recordWin();
  const status = document.getElementById('status');
  status.textContent = '🎉 完成！所有规则满足！';
  status.className = 'status win';

  setTimeout(() => {
    document.getElementById('winOverlay').classList.add('show');
  }, 700);
}

function reset() {
  initAudio();
  SFX.reset();
  // Reset on a touched, unresolved board counts as a loss.
  recordLoss();
  state = Array.from({length: N}, () => Array(N).fill(0));
  puzzleTouched = false;
  // After reset, the same puzzle continues — allow new resolution.
  puzzleResolved = false;
  render();
  document.getElementById('status').textContent = `🌱 准备种 ${N} 棵树！`;
  document.getElementById('status').className = 'status';
}

function hint() {
  initAudio();
  if (puzzleResolved) return;
  const solution = solve();
  if (!solution) return;
  for (let r = 0; r < N; r++) {
    for (let c = 0; c < N; c++) {
      if (solution[r][c] === 1 && state[r][c] !== 2) {
        state[r][c] = 2;
        puzzleTouched = true;
        recordHint();
        SFX.hint();
        render();
        checkWin();
        return;
      }
    }
  }
}

function autoSolve() {
  initAudio();
  const solution = solve();
  if (!solution) {
    document.getElementById('status').textContent = '无解';
    return;
  }
  // Showing the answer counts as a loss for this puzzle.
  recordLoss();
  // Force resolved so the auto-placed trees don't trigger a win record.
  puzzleResolved = true;
  state = Array.from({length: N}, () => Array(N).fill(0));
  render();
  const positions = [];
  for (let r = 0; r < N; r++)
    for (let c = 0; c < N; c++)
      if (solution[r][c] === 1) positions.push([r, c]);
  let i = 0;
  const interval = setInterval(() => {
    if (i >= positions.length) {
      clearInterval(interval);
      const status = document.getElementById('status');
      status.textContent = '✨ 这就是正确答案';
      status.className = 'status';
      return;
    }
    const [r, c] = positions[i++];
    state[r][c] = 2;
    SFX.tree();
    render();
  }, 220);
}

function solve() {
  const regions = getRegions();
  const regionKeys = Object.keys(regions);
  const result = Array.from({length: N}, () => Array(N).fill(0));
  const usedRows = new Set();
  const usedCols = new Set();

  function isValid(r, c) {
    if (usedRows.has(r) || usedCols.has(c)) return false;
    for (let dr = -1; dr <= 1; dr++)
      for (let dc = -1; dc <= 1; dc++) {
        if (dr === 0 && dc === 0) continue;
        const nr = r+dr, nc = c+dc;
        if (nr >= 0 && nr < N && nc >= 0 && nc < N && result[nr][nc] === 1) return false;
      }
    return true;
  }

  function backtrack(idx) {
    if (idx === regionKeys.length) return true;
    const key = regionKeys[idx];
    for (const [r, c] of regions[key]) {
      if (isValid(r, c)) {
        result[r][c] = 1;
        usedRows.add(r); usedCols.add(c);
        if (backtrack(idx + 1)) return true;
        result[r][c] = 0;
        usedRows.delete(r); usedCols.delete(c);
      }
    }
    return false;
  }

  return backtrack(0) ? result : null;
}

// ─── Init ────────────────────────────────────────────
setDiff('medium');
</script>
